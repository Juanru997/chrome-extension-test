<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logo Grabber</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Logo Grabber</h1>
      <p>Click start, then click any logo/image on the page.</p>
      <button id="startPicker">Start logo picker</button>
      <p class="hint">Tip: once selected, use the floating panel: <strong>Copy PNG</strong> or <strong>Save PNG</strong>.</p>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
